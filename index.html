<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語トレーニング</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>📚 英単語トレーニング</h1>

<section>
<h2>単語帳選択</h2>
<select id="bookSelect">
<option value="">読み込み中...</option>
</select>
<p><strong>単語帳：</strong><span id="bookTitle">未選択</span></p>
<p><strong>登録単語数：</strong><span id="wordCount">0</span>語</p>
</section>

<!-- quizArea -->
<section id="quizArea" style="display:none;">
<h2><span id="quiztitle">●●テスト</span></h2>

<!-- Read -->
<p id="questionWord"></p>
<span id="readTest" style="display:none;">
</span>
<span id="answerArea">
⇒<input id="answerInput" type="text" placeholder="日本語を入力"><button id="checkAnswerBtn">回答</button>
<p id="resultArea"></p>
</span>

<button id="nextQuestionBtn">次の問題</button>

<!-- keyboard -->
<span id="spelTest" style="display:none;">
<br/>
<div id="keyboard"></div>

<button id="backspaceBtn" class="subBtn">←</button>
<button id="clearBtn" class="subBtn">クリア</button>
</span>

</section>

<!-- quizFinish -->
<section id="quizFinish" style="display:none;">
</section>
<button id="shareBtn">結果を共有</button>
<button id="kaitoBtn">紙テストの答え</button>

<section>
    <h2>学習メニュー</h2>

<div class="menu-buttons">
    <button id="readingBtn" disabled>読みテスト</button>
    <button id="spellingBtn" disabled>スペルテスト</button>
    <button id="paperBtn" disabled>紙に書く</button>
 <!--   button id="weakBtn" disabled >苦手単語</button>-->
</div>
</section>

</main>

    <script src="apptest.js"></script>
    <script src="app.js"></script>
</body>
</html>
